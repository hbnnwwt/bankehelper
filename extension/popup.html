<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 400px; padding: 16px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 13px; }
    h1 { font-size: 16px; margin-bottom: 12px; }
    label { display: block; font-size: 13px; color: #666; margin-bottom: 4px; }
    input[type="text"] { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
    input[type="text"]:focus { outline: none; border-color: #4a90d9; }
    .btn-row { display: flex; gap: 8px; margin-top: 12px; }
    button { flex: 1; padding: 10px; background: #4a90d9; color: white; border: none; border-radius: 4px; font-size: 14px; cursor: pointer; }
    button:hover { background: #357abd; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    button.secondary { background: #6c757d; }
    button.secondary:hover { background: #545b62; }
    #result { margin-top: 12px; padding: 8px; border-radius: 4px; font-size: 13px; display: none; }
    #result.success { background: #d4edda; color: #155724; display: block; }
    #result.error { background: #f8d7da; color: #721c24; display: block; }
    #preview-container { margin-top: 12px; display: none; }
    #preview-container.show { display: block; }
    #preview-label { font-size: 12px; color: #666; margin-bottom: 4px; }
    #preview { max-height: 250px; overflow-y: auto; border: 1px solid #ddd; border-radius: 4px; padding: 8px; font-size: 11px; background: #f8f9fa; }
    #preview table { width: 100%; border-collapse: collapse; }
    #preview th, #preview td { border: 1px solid #ddd; padding: 4px 6px; text-align: left; }
    #preview th { background: #e9ecef; font-weight: 600; position: sticky; top: 0; }
    #preview tr:nth-child(even) { background: #fff; }
    #count { margin-top: 8px; font-size: 12px; color: #666; }
  </style>
</head>
<body>
  <h1>网页数据爬虫</h1>
  <label for="selector">CSS 选择器</label>
  <input type="text" id="selector" placeholder="例如: .topic-item" />
  <div class="btn-row">
    <button id="scrape" class="secondary">预览数据</button>
    <button id="download" disabled>下载 Excel</button>
  </div>
  <div id="result"></div>
  <div id="count"></div>
  <div id="preview-container">
    <div id="preview-label">数据预览（前10条）：</div>
    <div id="preview"></div>
  </div>
  <script src="xlsx.full.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
